<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>PhishLens</title>
  <style>
    :root {
      --bg-dark: #0c0314;
      --bg-purple: #1a0530;
      --purple-500: #7c3aed;
      --purple-400: #9333ea;
      --purple-300: #a855f7;
      --purple-200: #c084fc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #e6edf3;
      --text-muted: rgba(230, 237, 243, 0.65);
      --shadow-glow: rgba(124, 58, 237, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: var(--text-primary);
      background: 
        radial-gradient(1200px 600px at -10% 10%, rgba(124, 58, 237, 0.15), transparent 90%),
        radial-gradient(900px 400px at 110% 90%, rgba(147, 51, 234, 0.12), transparent 90%),
        linear-gradient(180deg, var(--bg-dark), var(--bg-purple));
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* Animated gradient blobs */
    body::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.3), transparent 90%);
      border-radius: 50%;
      top: -150px;
      right: -100px;
      filter: blur(60px);
      animation: float1 8s ease-in-out infinite;
    }

    body::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.25), transparent 70%);
      border-radius: 50%;
      bottom: -100px;
      left: -80px;
      filter: blur(50px);
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, 30px) scale(1.1); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, -20px) scale(1.15); }
    }

    /* Noise texture overlay */
    .noise-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0 1px, transparent 1px 6px);
      mix-blend-mode: overlay;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      padding: 10px;
      position: relative;
      z-index: 2;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(147, 51, 234, 0.2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--purple-200);
      box-shadow: 
        0 8px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #ffffff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-400);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Main glass card */
    .glass-card {
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.08), 
        rgba(255, 255, 255, 0.03));
      border-radius: 24px;
      padding: 15px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px) saturate(150%);
      position: relative;
      overflow: hidden;
    }

    /* Glass shine effect */
    .glass-card::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to bottom right,
        rgba(255, 255, 255, 0.1),
        transparent 50%
      );
      transform: rotate(-20deg);
      pointer-events: none;
    }

    /* URL Display */
    .url-section {
      margin-bottom: 16px;
    }

    .url-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--purple-300);
      margin-bottom: 8px;
    }

    .url-display {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
      line-height: 1.5;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Risk Meter */
    .risk-meter {
      margin: 15px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .score-display {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, 
        rgba(0, 0, 0, 0.5), 
        rgba(124, 58, 237, 0.1));
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.5),
        inset 0 -4px 20px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .score-number {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .score-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .meter-bar-container {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      padding: 3px;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .meter-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 20px;
      background: linear-gradient(90deg, 
        #22c55e 0%, 
        #f59e0b 50%, 
        #ef4444 100%);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Confidence Badge */
    .confidence-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 8px 0;
    }

    .confidence-badge {
      padding: 4px 12px;
      border-radius: 16px;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      font-size: 12px;
      font-weight: 600;
      color: var(--purple-200);
    }

    /* AI Explanation */
    .explanation-section {
      margin: 12px 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--purple-300);
      margin-bottom: 8px;
    }

    .explanation-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      padding: 8px 10px;
      background: rgba(124, 58, 237, 0.08);
      border-radius: 12px;
      border-left: 3px solid var(--purple-400);
      box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    /* Features List */
    .features-list {
      list-style: none;
      margin-top: 8px;
    }

    .features-list li {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .features-list li::before {
      content: "→";
      color: var(--purple-400);
      font-weight: 700;
      margin-right: 8px;
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: rgba(230, 237, 243, 0.4);
      letter-spacing: 0.3px;
    }

    .footer strong {
      color: var(--purple-300);
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--purple-400);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Status indicators */
    .status-safe {
      color: #22c55e;
    }

    .status-warning {
      color: #f59e0b;
    }

    .status-danger {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="logo" style="background-image: url('logo.png');"></div>
        <div class="brand-text">PhishLens</div>
      </div>
      <div class="status-badge" id="statusBadge">
        <div class="status-dot"></div>
        <span>Scanning...</span>
      </div>
    </div>

    <!-- Main Glass Card -->
    <div class="glass-card">
      <!-- URL Display -->
      <div class="url-section">
        <div class="url-label"> Analyzing ... </div>
        <div class="url-display" id="urlDisplay">Loading current page...</div>
      </div>

      <!-- Risk Meter -->
      <div class="risk-meter">
        <div class="score-display">
          <div class="score-number" id="scoreNumber">—</div>
          <div class="score-label">Risk Score</div>
        </div>
        
        <div class="meter-bar-container">
          <div class="meter-bar-fill" id="meterFill"></div>
        </div>
      </div>

      <!-- Confidence -->
      <div class="confidence-row">
        <div class="confidence-badge" id="confidenceBadge">
          Confidence: —
        </div>
      </div>

      <!-- AI Explanation -->
      <div class="explanation-section">
        <div class="section-title">
          <span>AI Analysis</span>
        </div>
        <div class="explanation-text" id="explanationText">
          Generating AI-powered explanation using Llama 3.2...
        </div>
      </div>

      <!-- Top Features -->
      <div class="explanation-section">
        <div class="section-title">
          <span>🔐</span>
          <span>Key Indicators</span>
        </div>
        <ul class="features-list" id="featuresList">
          <li>Analyzing URL structure...</li>
        </ul>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      Protected by <strong>Llama 3.2</strong> • Model v1.0
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
